name: Feature Request
description: 建议新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出宝贵建议！请描述你的需求和使用场景。
  - type: textarea
    id: problem
    attributes:
      label: 问题/需求描述
      description: 你想解决什么问题？当前有什么不便？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望得到什么样的功能或行为？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他解决方式？
  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 使用场景、截图、参考链接等
